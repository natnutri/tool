<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriGestão — Painel do Nutricionista</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --emerald: #2D9D78;
    --emerald-dark: #1E7A5C;
    --emerald-light: #3DB88E;
    --emerald-pale: #E6F7F0;
    --emerald-ghost: #F2FBF7;
    --amber: #E5A832;
    --amber-pale: #FFF8E7;
    --coral: #E06B5E;
    --coral-pale: #FFF0EE;
    --blue: #4A8FD6;
    --blue-pale: #EBF3FC;
    --slate-900: #1A1D23;
    --slate-800: #2A2D35;
    --slate-700: #3A3D45;
    --slate-500: #6B7080;
    --slate-400: #9196A1;
    --slate-300: #B8BCC6;
    --slate-200: #DFE1E6;
    --slate-100: #F0F1F4;
    --slate-50: #F7F8FA;
    --white: #FFFFFF;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--slate-50);
    color: var(--slate-800);
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════════
     VIEW TOGGLE — Patient Form vs Dashboard
     ═══════════════════════════════════════════ */
  .view-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 500;
    display: flex;
    background: var(--white);
    border-radius: 50px;
    padding: 4px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--slate-200);
  }

  .view-btn {
    padding: 8px 16px;
    border-radius: 50px;
    border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    background: transparent;
    color: var(--slate-500);
  }

  .view-btn.active {
    background: var(--emerald);
    color: var(--white);
  }

  /* ═══════════════════════════════════════════
     PATIENT INTAKE FORM
     ═══════════════════════════════════════════ */
  .patient-view {
    display: none;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--emerald-ghost) 0%, var(--white) 50%, var(--slate-50) 100%);
  }

  .patient-view.active { display: block; }

  .form-wrapper {
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  .form-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .form-logo {
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--emerald);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(45,157,120,0.3);
  }

  .form-header h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--slate-900);
    margin-bottom: 6px;
  }

  .form-header p {
    font-size: 14px;
    color: var(--slate-500);
  }

  .form-section {
    background: var(--white);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--slate-100);
  }

  .form-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--emerald);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-section-title span { font-size: 16px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-row.single { grid-template-columns: 1fr; }

  .form-group { margin-bottom: 0; }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate-700);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    height: 44px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--slate-200);
    padding: 0 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    color: var(--slate-800);
    background: var(--slate-50);
    outline: none;
    transition: border-color var(--transition);
  }

  .form-group textarea {
    height: 80px;
    padding: 12px 14px;
    resize: vertical;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--emerald);
    background: var(--white);
  }

  .form-group input::placeholder { color: var(--slate-400); }

  .btn-submit {
    width: 100%;
    height: 52px;
    border-radius: var(--radius);
    border: none;
    background: var(--emerald);
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 8px 28px rgba(45,157,120,0.3);
    margin-top: 8px;
  }

  .btn-submit:hover { background: var(--emerald-dark); transform: translateY(-1px); }

  .form-success {
    display: none;
    text-align: center;
    padding: 60px 24px;
  }

  .form-success.show { display: block; }

  .form-success .icon { font-size: 64px; margin-bottom: 20px; }

  .form-success h2 {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    color: var(--slate-900);
    margin-bottom: 10px;
  }

  .form-success p {
    font-size: 15px;
    color: var(--slate-500);
    line-height: 1.6;
  }

  /* ═══════════════════════════════════════════
     DASHBOARD
     ═══════════════════════════════════════════ */
  .dashboard-view {
    display: none;
    min-height: 100vh;
  }

  .dashboard-view.active { display: block; }

  /* top bar */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--slate-100);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--emerald);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .topbar-title {
    font-weight: 800;
    font-size: 18px;
    color: var(--slate-900);
  }

  .topbar-title em {
    font-style: normal;
    color: var(--emerald);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-date {
    font-size: 13px;
    color: var(--slate-500);
  }

  .topbar-avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--emerald-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  /* main content */
  .dash-main {
    padding: 28px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .dash-greeting {
    margin-bottom: 28px;
  }

  .dash-greeting h2 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--slate-900);
    margin-bottom: 4px;
  }

  .dash-greeting p {
    font-size: 14px;
    color: var(--slate-500);
  }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--slate-100);
    transition: all var(--transition);
  }

  .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

  .kpi-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 14px;
  }

  .kpi-icon.green { background: var(--emerald-pale); }
  .kpi-icon.amber { background: var(--amber-pale); }
  .kpi-icon.coral { background: var(--coral-pale); }
  .kpi-icon.blue { background: var(--blue-pale); }

  .kpi-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--slate-900);
    line-height: 1;
    margin-bottom: 4px;
  }

  .kpi-label {
    font-size: 13px;
    color: var(--slate-500);
  }

  /* two column layout */
  .dash-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .dash-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--slate-100);
    overflow: hidden;
  }

  .dash-card-header {
    padding: 18px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .dash-card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--slate-900);
  }

  .dash-card-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 50px;
    background: var(--emerald-pale);
    color: var(--emerald);
  }

  .dash-card-body {
    padding: 16px 20px 20px;
  }

  /* chart */
  .chart-container {
    position: relative;
    height: 220px;
  }

  /* patient list */
  .patient-list { list-style: none; }

  .patient-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--slate-100);
    cursor: pointer;
    transition: all var(--transition);
  }

  .patient-item:last-child { border-bottom: none; }
  .patient-item:hover { padding-left: 6px; }

  .patient-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--white);
    flex-shrink: 0;
  }

  .patient-info { flex: 1; min-width: 0; }

  .patient-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--slate-900);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .patient-meta {
    font-size: 12px;
    color: var(--slate-400);
    margin-top: 2px;
  }

  .patient-status {
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .status-new { background: var(--blue-pale); color: var(--blue); }
  .status-active { background: var(--emerald-pale); color: var(--emerald); }
  .status-attention { background: var(--coral-pale); color: var(--coral); }

  /* full width table card */
  .dash-full-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--slate-100);
    overflow: hidden;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--slate-400);
    background: var(--slate-50);
    border-bottom: 1px solid var(--slate-100);
    white-space: nowrap;
  }

  tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--slate-100);
    color: var(--slate-700);
    white-space: nowrap;
  }

  tbody tr:hover { background: var(--emerald-ghost); }
  tbody tr:last-child td { border-bottom: none; }

  .td-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    color: var(--slate-900);
  }

  .td-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: var(--white);
    flex-shrink: 0;
  }

  .td-change {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 50px;
  }

  .change-down { background: var(--emerald-pale); color: var(--emerald); }
  .change-up { background: var(--coral-pale); color: var(--coral); }
  .change-none { background: var(--slate-100); color: var(--slate-500); }

  .td-goal {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 50px;
    font-weight: 600;
  }

  .goal-emagrecer { background: var(--blue-pale); color: var(--blue); }
  .goal-massa { background: var(--amber-pale); color: var(--amber); }
  .goal-saude { background: var(--emerald-pale); color: var(--emerald); }
  .goal-esportivo { background: var(--coral-pale); color: var(--coral); }

  /* ── DETAIL MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,29,35,0.5);
    backdrop-filter: blur(4px);
    z-index: 600;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal-content {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h3 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--slate-900);
  }

  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: var(--slate-100);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-body { padding: 20px 24px 28px; }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-stat {
    background: var(--slate-50);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }

  .modal-stat .val {
    font-size: 22px;
    font-weight: 800;
    color: var(--slate-900);
  }

  .modal-stat .lbl {
    font-size: 11px;
    color: var(--slate-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .modal-chart { height: 200px; margin-bottom: 20px; }

  .modal-notes {
    background: var(--emerald-ghost);
    border-radius: var(--radius-sm);
    padding: 16px;
  }

  .modal-notes h4 {
    font-size: 13px;
    font-weight: 700;
    color: var(--emerald);
    margin-bottom: 8px;
  }

  .modal-notes p {
    font-size: 13px;
    color: var(--slate-700);
    line-height: 1.6;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--slate-400);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; color: var(--slate-700); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .btn-add-demo {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 50px;
    border: 2px solid var(--emerald);
    background: transparent;
    color: var(--emerald);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
  }

  .btn-add-demo:hover { background: var(--emerald); color: var(--white); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .dash-columns { grid-template-columns: 1fr; }
    .dash-main { padding: 20px 16px; }
    .topbar { padding: 14px 16px; }
  }

  @media (max-width: 500px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .kpi-value { font-size: 22px; }
    .modal-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- View Toggle -->
<div class="view-toggle">
  <button class="view-btn active" id="btnViewPatient" onclick="switchView('patient')">👤 Paciente</button>
  <button class="view-btn" id="btnViewDash" onclick="switchView('dashboard')">📊 Nutricionista</button>
</div>

<!-- ══════════════════════════════════════
     PATIENT INTAKE FORM
     ══════════════════════════════════════ -->
<div class="patient-view active" id="patientView">
  <div class="form-wrapper" id="formWrapper">
    <div class="form-header">
      <div class="form-logo">🥗</div>
      <h1>Cadastro Nutricional</h1>
      <p>Preencha seus dados para iniciar seu acompanhamento</p>
    </div>

    <div class="form-section">
      <div class="form-section-title"><span>👤</span> Dados Pessoais</div>
      <div class="form-row single">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="pName" placeholder="Seu nome" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Idade</label>
          <input type="number" id="pAge" placeholder="30" />
        </div>
        <div class="form-group">
          <label>Sexo</label>
          <select id="pSex">
            <option value="">Selecione</option>
            <option value="F">Feminino</option>
            <option value="M">Masculino</option>
            <option value="O">Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>WhatsApp</label>
          <input type="tel" id="pPhone" placeholder="(00) 00000-0000" oninput="fmtP(this)" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title"><span>📏</span> Medidas</div>
      <div class="form-row">
        <div class="form-group">
          <label>Peso atual (kg)</label>
          <input type="number" step="0.1" id="pWeight" placeholder="72.5" />
        </div>
        <div class="form-group">
          <label>Altura (cm)</label>
          <input type="number" id="pHeight" placeholder="170" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Circunf. abdominal (cm)</label>
          <input type="number" step="0.1" id="pWaist" placeholder="85" />
        </div>
        <div class="form-group">
          <label>% gordura (se souber)</label>
          <input type="number" step="0.1" id="pFat" placeholder="25" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title"><span>🎯</span> Objetivo</div>
      <div class="form-row single">
        <div class="form-group">
          <label>Objetivo principal</label>
          <select id="pGoal">
            <option value="">Selecione</option>
            <option value="emagrecer">Emagrecimento</option>
            <option value="massa">Ganho de massa</option>
            <option value="saude">Saúde e qualidade de vida</option>
            <option value="esportivo">Performance esportiva</option>
          </select>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Peso desejado (kg)</label>
          <input type="number" step="0.1" id="pGoalWeight" placeholder="65" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title"><span>🩺</span> Saúde</div>
      <div class="form-row single">
        <div class="form-group">
          <label>Restrições alimentares</label>
          <input type="text" id="pRestrictions" placeholder="Lactose, glúten, nenhuma..." />
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Condições de saúde</label>
          <input type="text" id="pConditions" placeholder="Diabetes, hipertensão, nenhuma..." />
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Observações adicionais</label>
          <textarea id="pNotes" placeholder="Algo que gostaria de compartilhar..."></textarea>
        </div>
      </div>
    </div>

    <button class="btn-submit" onclick="submitPatient()">Enviar meus dados</button>
  </div>

  <div class="form-success" id="formSuccess">
    <div class="icon">✅</div>
    <h2>Dados enviados com sucesso!</h2>
    <p>Seu nutricionista receberá suas informações e entrará em contato pelo WhatsApp para agendar sua consulta.</p>
  </div>
</div>

<!-- ══════════════════════════════════════
     DASHBOARD
     ══════════════════════════════════════ -->
<div class="dashboard-view" id="dashView">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">🥗</div>
      <div class="topbar-title">Nutri<em>Gestão</em></div>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="topDate"></span>
      <div class="topbar-avatar">👩‍⚕️</div>
    </div>
  </div>

  <div class="dash-main" id="dashMain"></div>
</div>

<!-- ══════════════════════════════════════
     DETAIL MODAL
     ══════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ═══ DATA STORE ═══
function getPatients() {
  try { return JSON.parse(localStorage.getItem('nutri_patients') || '[]'); } catch { return []; }
}
function savePatients(arr) {
  localStorage.setItem('nutri_patients', JSON.stringify(arr));
}

// ═══ VIEW TOGGLE ═══
function switchView(v) {
  document.getElementById('patientView').classList.toggle('active', v === 'patient');
  document.getElementById('dashView').classList.toggle('active', v === 'dashboard');
  document.getElementById('btnViewPatient').classList.toggle('active', v === 'patient');
  document.getElementById('btnViewDash').classList.toggle('active', v === 'dashboard');
  if (v === 'dashboard') renderDashboard();
}

// ═══ PATIENT FORM ═══
function fmtP(el) {
  let v = el.value.replace(/\D/g,'');
  if (v.length > 11) v = v.slice(0,11);
  if (v.length > 7) v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
  else if (v.length > 2) v = '(' + v.slice(0,2) + ') ' + v.slice(2);
  el.value = v;
}

function submitPatient() {
  const name = document.getElementById('pName').value.trim();
  const weight = parseFloat(document.getElementById('pWeight').value);
  const height = parseFloat(document.getElementById('pHeight').value);
  const goal = document.getElementById('pGoal').value;

  if (!name || !weight || !height || !goal) {
    alert('Preencha pelo menos: nome, peso, altura e objetivo.');
    return;
  }

  const bmi = (weight / ((height/100) ** 2)).toFixed(1);

  const patient = {
    id: Date.now().toString(36),
    name,
    age: parseInt(document.getElementById('pAge').value) || null,
    sex: document.getElementById('pSex').value,
    phone: document.getElementById('pPhone').value,
    goal,
    goalWeight: parseFloat(document.getElementById('pGoalWeight').value) || null,
    restrictions: document.getElementById('pRestrictions').value,
    conditions: document.getElementById('pConditions').value,
    notes: document.getElementById('pNotes').value,
    createdAt: new Date().toISOString(),
    status: 'new',
    records: [{
      date: new Date().toISOString().slice(0,10),
      weight,
      height,
      bmi: parseFloat(bmi),
      waist: parseFloat(document.getElementById('pWaist').value) || null,
      fat: parseFloat(document.getElementById('pFat').value) || null
    }]
  };

  const patients = getPatients();
  patients.push(patient);
  savePatients(patients);

  document.getElementById('formWrapper').style.display = 'none';
  document.getElementById('formSuccess').classList.add('show');
}

// ═══ DEMO DATA ═══
function loadDemo() {
  const demo = [
    { id:'d1', name:'Ana Silva', age:28, sex:'F', phone:'(11) 99876-5432', goal:'emagrecer', goalWeight:60, restrictions:'Lactose', conditions:'Nenhuma', notes:'', createdAt:'2026-01-15', status:'active',
      records: [
        { date:'2026-01-15', weight:78, height:165, bmi:28.7, waist:92, fat:32 },
        { date:'2026-02-01', weight:76.2, height:165, bmi:28.0, waist:90, fat:31 },
        { date:'2026-02-15', weight:74.8, height:165, bmi:27.5, waist:88, fat:30 },
        { date:'2026-03-01', weight:73.1, height:165, bmi:26.8, waist:86, fat:28.5 },
        { date:'2026-03-15', weight:71.5, height:165, bmi:26.3, waist:84, fat:27 }
      ]},
    { id:'d2', name:'Carlos Mendes', age:35, sex:'M', phone:'(11) 98765-4321', goal:'massa', goalWeight:85, restrictions:'Nenhuma', conditions:'Nenhuma', notes:'Treina musculação 5x/semana', createdAt:'2026-02-01', status:'active',
      records: [
        { date:'2026-02-01', weight:72, height:178, bmi:22.7, waist:80, fat:18 },
        { date:'2026-02-15', weight:73.2, height:178, bmi:23.1, waist:80, fat:17.5 },
        { date:'2026-03-01', weight:74.5, height:178, bmi:23.5, waist:81, fat:17 },
        { date:'2026-03-15', weight:75.8, height:178, bmi:23.9, waist:81, fat:16.5 }
      ]},
    { id:'d3', name:'Mariana Oliveira', age:42, sex:'F', phone:'(21) 97654-3210', goal:'saude', goalWeight:68, restrictions:'Glúten', conditions:'Hipotireoidismo', notes:'Quer melhorar exames', createdAt:'2026-02-10', status:'attention',
      records: [
        { date:'2026-02-10', weight:82, height:162, bmi:31.2, waist:96, fat:36 },
        { date:'2026-03-01', weight:81.5, height:162, bmi:31.1, waist:95.5, fat:35.8 },
        { date:'2026-03-15', weight:81.8, height:162, bmi:31.2, waist:96, fat:36 }
      ]},
    { id:'d4', name:'Pedro Santos', age:24, sex:'M', phone:'(11) 96543-2109', goal:'esportivo', goalWeight:75, restrictions:'Nenhuma', conditions:'Nenhuma', notes:'Corredor amador', createdAt:'2026-03-01', status:'active',
      records: [
        { date:'2026-03-01', weight:70, height:175, bmi:22.9, waist:78, fat:15 },

      ]},
    { id:'d5', name:'Lúcia Ferreira', age:55, sex:'F', phone:'(31) 95432-1098', goal:'saude', goalWeight:70, restrictions:'Lactose, frutos do mar', conditions:'Diabetes tipo 2, hipertensão', notes:'Medicamento: metformina', createdAt:'2026-03-10', status:'active',
      records: [
        { date:'2026-03-10', weight:88, height:160, bmi:34.4, waist:102, fat:40 },
        { date:'2026-03-24', weight:86.5, height:160, bmi:33.8, waist:100, fat:39 }

// ═══ DASHBOARD ═══
const COLORS = ['#2D9D78','#4A8FD6','#E5A832','#E06B5E','#8B7EC8','#D47FA6','#5BBDB9','#C4704B'];
const GOAL_LABELS = { emagrecer:'Emagrecer', massa:'Ganho de massa', saude:'Saúde', esportivo:'Esportivo' };
const GOAL_CLASSES = { emagrecer:'goal-emagrecer', massa:'goal-massa', saude:'goal-saude', esportivo:'goal-esportivo' };
const STATUS_LABELS = { new:'Novo', active:'Ativo', attention:'Atenção' };
const STATUS_CLASSES = { new:'status-new', active:'status-active', attention:'status-attention' };

function renderDashboard() {
  const patients = getPatients();
  const main = document.getElementById('dashMain');
  document.getElementById('topDate').textContent = new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });

  if (patients.length === 0) {
    main.innerHTML = `
      <div class="dash-greeting">
        <h2>Bom dia! 👋</h2>
        <p>Seu painel de gestão de pacientes</p>
      </div>
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>Nenhum paciente cadastrado</h3>
        <p>Quando seus pacientes preencherem o formulário, os dados aparecerão aqui automaticamente.</p>
        <button class="btn-add-demo" onclick="loadDemo()">Carregar dados de demonstração</button>
      </div>
    `;
    return;
  }

  // KPIs
  const total = patients.length;
  const newCount = patients.filter(p => p.status === 'new').length;
  const attentionCount = patients.filter(p => p.status === 'attention').length;
  const avgLoss = patients.filter(p => p.records.length > 1).map(p => {
    const first = p.records[0].weight;
    const last = p.records[p.records.length-1].weight;
    return first - last;
  });
  const avgChange = avgLoss.length ? (avgLoss.reduce((a,b) => a+b, 0) / avgLoss.length).toFixed(1) : '0';

  // recent patients (last 5)
  const recent = [...patients].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5);

  main.innerHTML = `
    <div class="dash-greeting">
      <h2>Bom dia! 👋</h2>
      <p>Você tem ${total} paciente${total > 1 ? 's' : ''} cadastrado${total > 1 ? 's' : ''}</p>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-icon green">👥</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-label">Total de pacientes</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon blue">🆕</div>
        <div class="kpi-value">${newCount}</div>
        <div class="kpi-label">Novos cadastros</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon coral">⚠️</div>
        <div class="kpi-value">${attentionCount}</div>
        <div class="kpi-label">Precisam de atenção</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon amber">📉</div>
        <div class="kpi-value">${avgChange}kg</div>
        <div class="kpi-label">Perda média</div>
      </div>
    </div>

    <div class="dash-columns">
      <div class="dash-card">
        <div class="dash-card-header">
          <div class="dash-card-title">Evolução de peso</div>
          <div class="dash-card-badge">Últimos 3 meses</div>
        </div>
        <div class="dash-card-body">
          <div class="chart-container"><canvas id="weightChart"></canvas></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-header">
          <div class="dash-card-title">Pacientes recentes</div>
        </div>
        <div class="dash-card-body">
          <ul class="patient-list">
            ${recent.map((p, i) => {
              const initials = p.name.split(' ').map(w => w[0]).join('').slice(0,2);
              const lastRec = p.records[p.records.length-1];
              return `
                <li class="patient-item" onclick="openPatient('${p.id}')">
                  <div class="patient-avatar" style="background:${COLORS[i % COLORS.length]}">${initials}</div>
                  <div class="patient-info">
                    <div class="patient-name">${p.name}</div>
                    <div class="patient-meta">${lastRec.weight}kg · IMC ${lastRec.bmi} · ${GOAL_LABELS[p.goal] || p.goal}</div>
                  </div>
                  <span class="patient-status ${STATUS_CLASSES[p.status]}">${STATUS_LABELS[p.status]}</span>
                </li>
              `;
            }).join('')}
          </ul>
        </div>
      </div>
    </div>

    <div class="dash-full-card">
      <div class="dash-card-header" style="padding-bottom:0">
        <div class="dash-card-title">Todos os pacientes</div>
        <div class="dash-card-badge">${total} pacientes</div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Paciente</th>
              <th>Idade</th>
              <th>Peso atual</th>
              <th>IMC</th>
              <th>Variação</th>
              <th>Objetivo</th>
              <th>Meta</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${patients.map((p, i) => {
              const initials = p.name.split(' ').map(w => w[0]).join('').slice(0,2);
              const last = p.records[p.records.length-1];
              const first = p.records[0];
              const diff = (last.weight - first.weight).toFixed(1);
              const diffClass = diff < 0 ? 'change-down' : diff > 0 ? 'change-up' : 'change-none';
              const arrow = diff < 0 ? '↓' : diff > 0 ? '↑' : '→';
              return `
                <tr onclick="openPatient('${p.id}')" style="cursor:pointer">
                  <td><div class="td-name"><div class="td-avatar" style="background:${COLORS[i % COLORS.length]}">${initials}</div>${p.name}</div></td>
                  <td>${p.age || '—'}</td>
                  <td><strong>${last.weight}kg</strong></td>
                  <td>${last.bmi}</td>
                  <td><span class="td-change ${diffClass}">${arrow} ${Math.abs(diff)}kg</span></td>
                  <td><span class="td-goal ${GOAL_CLASSES[p.goal]}">${GOAL_LABELS[p.goal] || p.goal}</span></td>
                  <td>${p.goalWeight ? p.goalWeight + 'kg' : '—'}</td>
                  <td><span class="patient-status ${STATUS_CLASSES[p.status]}">${STATUS_LABELS[p.status]}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  // Weight evolution chart
  const activePatients = patients.filter(p => p.records.length > 1).slice(0, 5);
  if (activePatients.length > 0) {
    const allDates = [...new Set(activePatients.flatMap(p => p.records.map(r => r.date)))].sort();
    const datasets = activePatients.map((p, i) => ({
      label: p.name.split(' ')[0],
      data: allDates.map(d => { const r = p.records.find(rec => rec.date === d); return r ? r.weight : null; }),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + '20',
      borderWidth: 2.5,
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: 0.3,
      spanGaps: true,
      fill: false
    }));

    new Chart(document.getElementById('weightChart'), {
      type: 'line',
      data: { labels: allDates.map(d => { const [,m,day] = d.split('-'); return day + '/' + m; }), datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, usePointStyle: true, pointStyle: 'circle', padding: 16 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, color: '#9196A1' } },
          y: { grid: { color: '#F0F1F4' }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, color: '#9196A1', callback: v => v + 'kg' } }
        },
        interaction: { intersect: false, mode: 'index' }
      }
    });
  }
}

// ═══ PATIENT DETAIL MODAL ═══
function openPatient(id) {
  const patients = getPatients();
  const p = patients.find(x => x.id === id);
  if (!p) return;

  const last = p.records[p.records.length-1];
  const first = p.records[0];
  const diff = (last.weight - first.weight).toFixed(1);

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <h3>${p.name}</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stats">
        <div class="modal-stat"><div class="val">${last.weight}kg</div><div class="lbl">Peso atual</div></div>
        <div class="modal-stat"><div class="val">${last.bmi}</div><div class="lbl">IMC</div></div>
        <div class="modal-stat"><div class="val">${diff > 0 ? '+' : ''}${diff}kg</div><div class="lbl">Variação</div></div>
        ${last.waist ? `<div class="modal-stat"><div class="val">${last.waist}cm</div><div class="lbl">Cintura</div></div>` : ''}
        ${last.fat ? `<div class="modal-stat"><div class="val">${last.fat}%</div><div class="lbl">Gordura</div></div>` : ''}
        ${p.goalWeight ? `<div class="modal-stat"><div class="val">${p.goalWeight}kg</div><div class="lbl">Meta</div></div>` : ''}
      </div>

      <div class="modal-chart"><canvas id="modalChart"></canvas></div>

      <div class="modal-notes">
        <h4>📋 Informações do paciente</h4>
        <p>
          <strong>Objetivo:</strong> ${GOAL_LABELS[p.goal] || p.goal}<br>
          <strong>Idade:</strong> ${p.age || '—'} · <strong>Sexo:</strong> ${p.sex || '—'}<br>
          ${p.restrictions ? '<strong>Restrições:</strong> ' + p.restrictions + '<br>' : ''}
          ${p.conditions ? '<strong>Condições:</strong> ' + p.conditions + '<br>' : ''}
          ${p.notes ? '<strong>Obs:</strong> ' + p.notes + '<br>' : ''}
          <strong>WhatsApp:</strong> ${p.phone || '—'}
        </p>
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');

  // mini chart
  setTimeout(() => {
    const labels = p.records.map(r => { const [,m,d] = r.date.split('-'); return d+'/'+m; });
    new Chart(document.getElementById('modalChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Peso', data: p.records.map(r => r.weight), borderColor: '#2D9D78', backgroundColor: '#2D9D7820', borderWidth: 2.5, pointRadius: 5, tension: 0.3, fill: true },
          ...(p.records[0].waist ? [{ label: 'Cintura', data: p.records.map(r => r.waist), borderColor: '#E5A832', borderWidth: 2, pointRadius: 4, tension: 0.3, borderDash: [5,3] }] : [])
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, usePointStyle: true, padding: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#9196A1' } },
          y: { grid: { color: '#F0F1F4' }, ticks: { font: { size: 11 }, color: '#9196A1' } }
        }
      }
    });
  }, 100);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// ═══ INIT ═══
</script>
</body>
</html>
